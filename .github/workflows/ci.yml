name: FinPilot CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: finpilot_test
          POSTGRES_USER: finpilot
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-for-ci-only
      DEBUG: "True"
      DATABASE_URL: postgres://finpilot:testpassword@localhost:5432/finpilot_test
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test fin_manager --verbosity=2

      - name: Check for missing migrations
        run: python manage.py migrate --check

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        # Uncomment and add RAILWAY_TOKEN to GitHub secrets when ready
        # uses: bervProject/railway-deploy@main
        # with:
        #   railway_token: ${{ secrets.RAILWAY_TOKEN }}
        #   service: finpilot-web
        run: echo "Deploy step — configure Railway token in GitHub secrets"
