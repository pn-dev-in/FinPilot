{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FinPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body class="auth-body">
  <div class="auth-card">
    <a href="{% url 'landing' %}" class="logo" style="margin-bottom:1.5rem;display:inline-flex;text-decoration:none">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2"/></svg></div>
      <span class="logo-text">FinPilot</span>
    </a>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your FinPilot account.</p>

    {% if form.errors %}
    <div class="fp-error" style="margin-bottom:1rem;padding:.75rem;border-radius:8px;background:#FCEBEB">
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="fp-label">Username</label>
        <input type="text" name="username" class="fp-input" autofocus required>
      </div>
      <div class="form-group">
        <label class="fp-label">Password</label>
        <input type="password" name="password" class="fp-input" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn-primary" style="width:100%;margin-top:1rem">Sign In →</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Create one free</a></p>
  </div>
</body>
</html>
