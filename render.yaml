services:
  - type: web
    name: finpilot
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn finpilot.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finpilot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: PYTHON_VERSION
        value: 3.12.0
    plan: free

databases:
  - name: finpilot-db
    plan: free